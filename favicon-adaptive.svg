<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="VAMM">
  <!-- Dark rounded-square plate — keeps the gold mark visible on any tab colour -->
  <rect x="0" y="0" width="64" height="64" rx="11" ry="11" fill="#0A0807"/>
  <!-- Subtle inner border for extra definition -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="10.5" ry="10.5"
        fill="none" stroke="#C07B52" stroke-opacity="0.28" stroke-width="1"/>
  <!-- Mountain peaks (twin triangles) in gold -->
  <path fill="#D9946B" d="
    M 9 50
    L 22 24
    L 30 36
    L 34 28
    L 39 36
    L 45 28
    L 57 50
    Z
  "/>
  <!-- Pickaxe handle -->
  <rect fill="#D9946B" x="34.2" y="11" width="3" height="22" rx="1.1"
        transform="rotate(28 35.7 22)"/>
  <!-- Pickaxe head (curved bar) -->
  <path fill="#D9946B" d="
    M 31 13
    Q 43 7 54 15
    L 52 18
    Q 43 12 33 16
    Z
  "/>
</svg>
